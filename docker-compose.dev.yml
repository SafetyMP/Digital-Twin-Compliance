services:
  core-banking-db:
    image: postgres:16
    environment:
      POSTGRES_USER: core
      POSTGRES_PASSWORD: core
      POSTGRES_DB: core_banking
    command: postgres -c wal_level=logical -c max_wal_senders=10 -c max_replication_slots=10
    ports:
      - "5433:5432"
    volumes:
      - core_banking_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U core -d core_banking"]
      interval: 5s
      timeout: 5s
      retries: 10

  state-db:
    image: postgres:16
    environment:
      POSTGRES_USER: state
      POSTGRES_PASSWORD: state
      POSTGRES_DB: twin_state
    ports:
      - "5434:5432"
    volumes:
      - state_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U state -d twin_state"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/subjects || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  debezium:
    image: debezium/connect:2.6
    depends_on:
      kafka:
        condition: service_healthy
      core-banking-db:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: debezium
      CONFIG_STORAGE_TOPIC: debezium_configs
      OFFSET_STORAGE_TOPIC: debezium_offsets
      STATUS_STORAGE_TOPIC: debezium_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  state-service:
    build:
      context: ./services/state-service
      dockerfile: Dockerfile
    depends_on:
      state-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      debezium:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      STATE_DB_URL: postgres://state:state@state-db:5432/twin_state?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      DEFAULT_TENANT_ID: "00000000-0000-0000-0000-000000000001"
      STATE_SERVICE_HTTP_ADDR: ":8080"
      STATE_SERVICE_SOURCE: state-service
      DEBEZIUM_TOPICS: domain.events.public.legal_entities,domain.events.public.accounts,domain.events.public.instruments
      STATE_CDC_DLQ_TOPIC: domain.events.dlq
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  alert-db:
    image: postgres:16
    environment:
      POSTGRES_USER: alert
      POSTGRES_PASSWORD: alert
      POSTGRES_DB: alerts
    ports:
      - "5435:5432"
    volumes:
      - alert_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alert -d alerts"]
      interval: 5s
      timeout: 5s
      retries: 10

  alert-service:
    build:
      context: ./services/alert-service
      dockerfile: Dockerfile
    depends_on:
      alert-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8085:8085"
    environment:
      ALERT_DB_URL: postgres://alert:alert@alert-db:5432/alerts?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      DEFAULT_TENANT_ID: "00000000-0000-0000-0000-000000000001"
      ALERT_SERVICE_HTTP_ADDR: ":8085"
      ALERT_SERVICE_WS_PATH: /ws/alerts
      COMPLIANCE_ALERTS_TOPIC: compliance.alerts
      COMPLIANCE_ALERTS_DLQ_TOPIC: compliance.alerts.dlq
      KAFKA_AUDIT_PENDING_TOPIC: compliance.audit.pending
      KAFKA_AUDIT_RECORDED_TOPIC: compliance.audit.recorded
      ALERT_SERVICE_SOURCE: alert-service
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  flink-jobmanager:
    image: flink:1.18-java17
    ports:
      - "8082:8081"
      - "9249:9249"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 2
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        metrics.reporter.prom.port: 9249
    volumes:
      - flink_checkpoints:/tmp/flink-checkpoints
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/overview || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  flink-taskmanager:
    image: flink:1.18-java17
    depends_on:
      flink-jobmanager:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 2
    volumes:
      - flink_checkpoints:/tmp/flink-checkpoints

  flink-job-submitter:
    image: maven:3.9-eclipse-temurin-17
    depends_on:
      flink-taskmanager:
        condition: service_started
      flink-jobmanager:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      alert-service:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      FLINK_JOBMANAGER_URL: http://flink-jobmanager:8081
      CEP_VELOCITY_MAX_PER_HOUR: "50"
      CEP_EXPOSURE_LIMIT_EUR: "10000000"
      CEP_LCR_MINIMUM: "1.0"
      FLINK_PARALLELISM: "1"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        apt-get update -qq && apt-get install -y -qq curl jq >/dev/null
        cd /workspace/jobs/compliance-cep && mvn -q package -DskipTests
        cd /workspace && FLINK_JOBMANAGER_URL=http://flink-jobmanager:8081 ./scripts/submit-flink-job.sh
        echo "Flink job submitter done; sleeping to keep container alive for logs"
        sleep infinity
    restart: "no"

  alert-console:
    build:
      context: ./apps/alert-console
      dockerfile: Dockerfile
    depends_on:
      alert-service:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_ALERT_SERVICE_URL: http://localhost:8085
      NEXT_PUBLIC_WS_URL: ws://localhost:8085/ws/alerts

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - --kafka.server=kafka:9092
    ports:
      - "9308:9308"

  prometheus:
    image: prom/prometheus:v2.52.0
    depends_on:
      kafka-exporter:
        condition: service_started
      flink-jobmanager:
        condition: service_healthy
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  immudb:
    image: codenotary/immudb:latest
    ports:
      - "3322:3322"
      - "9497:9497"
    environment:
      IMMUDB_ADDRESS: 0.0.0.0
      IMMUDB_PORT: 3322
      IMMUDB_METRICS_PORT: 9497
    volumes:
      - immudb_data:/var/lib/immudb
    healthcheck:
      test: ["CMD", "/usr/local/bin/immuadmin", "status"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  audit-db:
    image: postgres:16
    environment:
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit
      POSTGRES_DB: audit
    ports:
      - "5436:5432"
    volumes:
      - audit_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit -d audit"]
      interval: 5s
      timeout: 5s
      retries: 10

  audit-service:
    build:
      context: ./services/audit-service
      dockerfile: Dockerfile
    depends_on:
      audit-db:
        condition: service_healthy
      immudb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8090:8090"
    environment:
      AUDIT_DB_URL: postgres://audit:audit@audit-db:5432/audit?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      IMMUDB_HOST: immudb
      IMMUDB_PORT: "3322"
      IMMUDB_DATABASE: digitaltwin_audit
      IMMUDB_USER: immudb
      IMMUDB_PASSWORD: immudb
      AUDIT_SERVICE_HTTP_ADDR: ":8090"
      KAFKA_AUDIT_PENDING_TOPIC: compliance.audit.pending
      KAFKA_AUDIT_RECORDED_TOPIC: compliance.audit.recorded
      AUDIT_ARTIFACT_DIR: /data/audit-artifacts
      DEFAULT_TENANT_ID: "00000000-0000-0000-0000-000000000001"
    volumes:
      - audit_artifacts:/data/audit-artifacts
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s

  cedar-service:
    build:
      context: ./services/cedar-service
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8091:8091"
    environment:
      KAFKA_BROKERS: kafka:9092
      CEDAR_SERVICE_HTTP_ADDR: ":8091"
      CEDAR_POLICY_DIR: /policies/cedar
      KAFKA_AUDIT_PENDING_TOPIC: compliance.audit.pending
      DEFAULT_PRINCIPAL: operator-dev
      DEFAULT_ROLES: Analyst
    volumes:
      - ./policies/cedar:/policies/cedar:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8091/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  decision-service:
    build:
      context: ./services/decision-service
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8092:8092"
    environment:
      KAFKA_BROKERS: kafka:9092
      DECISION_SERVICE_HTTP_ADDR: ":8092"
      ZEN_POLICY_DIR: /policies/zen
      KAFKA_AUDIT_PENDING_TOPIC: compliance.audit.pending
    volumes:
      - ./policies/zen:/policies/zen:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8092/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  audit-explorer:
    build:
      context: ./apps/audit-explorer
      dockerfile: Dockerfile
    depends_on:
      audit-service:
        condition: service_healthy
    ports:
      - "3002:3000"
    environment:
      AUDIT_SERVICE_URL: http://audit-service:8090

  grafana:
    image: grafana/grafana:10.4.0
    depends_on:
      prometheus:
        condition: service_started
    ports:
      - "3030:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  core_banking_data:
  state_data:
  alert_data:
  audit_data:
  immudb_data:
  audit_artifacts:
  flink_checkpoints:
