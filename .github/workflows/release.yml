name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          generate_release_notes: true
          body: |
            ## Container images

            Published to GHCR for this release (`${{ github.ref_name }}`):

            ```text
            ghcr.io/safetymp/digital-twin-compliance/state-service:${{ github.ref_name }}
            ghcr.io/safetymp/digital-twin-compliance/alert-service:${{ github.ref_name }}
            ghcr.io/safetymp/digital-twin-compliance/alert-console:${{ github.ref_name }}
            ghcr.io/safetymp/digital-twin-compliance/compliance-cep:${{ github.ref_name }}
            ghcr.io/safetymp/digital-twin-compliance/audit-service:${{ github.ref_name }}
            ghcr.io/safetymp/digital-twin-compliance/cedar-service:${{ github.ref_name }}
            ghcr.io/safetymp/digital-twin-compliance/decision-service:${{ github.ref_name }}
            ghcr.io/safetymp/digital-twin-compliance/audit-explorer:${{ github.ref_name }}
            ```

            Semver tags also publish `:latest` on application images.

            ## Deploy

            ```bash
            export IMAGE_TAG=${{ github.ref_name }}
            export STATE_SERVICE_IMAGE=ghcr.io/safetymp/digital-twin-compliance/state-service:${IMAGE_TAG}
            export ALERT_SERVICE_IMAGE=ghcr.io/safetymp/digital-twin-compliance/alert-service:${IMAGE_TAG}
            export ALERT_CONSOLE_IMAGE=ghcr.io/safetymp/digital-twin-compliance/alert-console:${IMAGE_TAG}
            export COMPLIANCE_CEP_IMAGE=ghcr.io/safetymp/digital-twin-compliance/compliance-cep:${IMAGE_TAG}
            export AUDIT_SERVICE_IMAGE=ghcr.io/safetymp/digital-twin-compliance/audit-service:${IMAGE_TAG}
            export CEDAR_SERVICE_IMAGE=ghcr.io/safetymp/digital-twin-compliance/cedar-service:${IMAGE_TAG}
            export DECISION_SERVICE_IMAGE=ghcr.io/safetymp/digital-twin-compliance/decision-service:${IMAGE_TAG}
            export AUDIT_EXPLORER_IMAGE=ghcr.io/safetymp/digital-twin-compliance/audit-explorer:${IMAGE_TAG}
            ./scripts/deploy-stack.sh pull
            ```

            Full guide: [docs/deployment.md](https://github.com/SafetyMP/Digital-Twin-Compliance/blob/main/docs/deployment.md).

            See [CHANGELOG.md](https://github.com/SafetyMP/Digital-Twin-Compliance/blob/main/CHANGELOG.md) for release notes.
