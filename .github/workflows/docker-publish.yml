name: Docker Publish

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra image tag (optional, e.g. staging)"
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/safetymp/digital-twin-compliance/state-service

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build and push State Service
        uses: docker/build-push-action@v7
        with:
          context: ./services/state-service
          file: ./services/state-service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker metadata (alert-service)
        id: meta_alert
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/safetymp/digital-twin-compliance/alert-service
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push Alert Service
        uses: docker/build-push-action@v7
        with:
          context: ./services/alert-service
          file: ./services/alert-service/Dockerfile
          push: true
          tags: ${{ steps.meta_alert.outputs.tags }}
          labels: ${{ steps.meta_alert.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker metadata (alert-console)
        id: meta_ui
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/safetymp/digital-twin-compliance/alert-console
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push Alert Console
        uses: docker/build-push-action@v7
        with:
          context: ./apps/alert-console
          file: ./apps/alert-console/Dockerfile
          push: true
          tags: ${{ steps.meta_ui.outputs.tags }}
          labels: ${{ steps.meta_ui.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Flink job JAR
        run: cd jobs/compliance-cep && mvn -q package -DskipTests

      - name: Docker metadata (compliance-cep)
        id: meta_cep
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/safetymp/digital-twin-compliance/compliance-cep
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push compliance-cep runtime image
        uses: docker/build-push-action@v7
        with:
          context: ./jobs/compliance-cep
          file: ./jobs/compliance-cep/Dockerfile
          push: true
          tags: ${{ steps.meta_cep.outputs.tags }}
          labels: ${{ steps.meta_cep.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          echo "### Published images" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
