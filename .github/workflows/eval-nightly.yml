name: Eval Nightly

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  eval-nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq postgresql-client curl ripgrep

      - name: Eval fixture regression (efficiency + behavioral)
        run: chmod +x scripts/run-eval-fixtures.sh && ./scripts/run-eval-fixtures.sh

      - name: Harness calibration
        run: python3 ./scripts/calibrate-harness.py --fail-on-regression

      - name: Start stack
        run: docker compose -f docker-compose.dev.yml up -d --wait

      - name: Seed databases
        run: ./scripts/seed.sh

      - name: Register schemas
        run: ./scripts/register-schemas.sh

      - name: Register Debezium connector
        run: ./scripts/register-debezium-connector.sh

      - name: Restart state-service after connector
        run: docker compose -f docker-compose.dev.yml restart state-service && docker compose -f docker-compose.dev.yml up -d --wait state-service

      - name: Wait for Flink job
        run: |
          for i in $(seq 1 90); do
            if curl -sf http://localhost:8082/jobs | jq -e '.jobs[] | select(.status=="RUNNING")' >/dev/null; then
              echo "Flink job running"
              exit 0
            fi
            sleep 5
          done
          echo "Flink job did not reach RUNNING" >&2
          exit 1

      - name: Phase 1 full evals
        run: ./scripts/run-live-evals.sh --full

      - name: Phase 2 full evals
        run: chmod +x scripts/smoke-test-phase2.sh mocks/simulators/payment-burst.sh scripts/submit-flink-job.sh && ./scripts/run-live-evals-phase2.sh --full

      - name: Invariant library unit tests
        run: python3 -m pytest evals/lib/test_invariants.py -q

      - name: Behavioral eval fixture smoke
        run: chmod +x scripts/run-behavioral-eval.sh && ./scripts/run-behavioral-eval.sh --phase2 --scenario add-cedar-policy --dry-run

      - name: Write eval summary
        if: always()
        run: |
          mkdir -p eval-artifacts
          {
            echo "# Eval Nightly Summary"
            echo "- Phase 1 mechanical+DoD: see job log"
            echo "- Phase 2 mechanical+DoD: see job log"
            echo "- Efficiency + behavioral fixtures: ./scripts/run-eval-fixtures.sh"
            echo "- Harness calibration: ./scripts/calibrate-harness.py"
          } > eval-artifacts/summary.md

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-nightly-summary
          path: eval-artifacts/
