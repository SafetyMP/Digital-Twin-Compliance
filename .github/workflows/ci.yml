name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  phase1:
    runs-on: ubuntu-latest
    env:
      COMPOSE_PROJECT_NAME: digitaltwin
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.89"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq postgresql-client curl ripgrep
          python3 -m pip install --user pytest

      - name: Go vet (state-service)
        working-directory: services/state-service
        run: go vet ./...

      - name: Go tests (state-service)
        working-directory: services/state-service
        run: go test ./...

      - name: Go tests (alert-service)
        working-directory: services/alert-service
        run: go mod tidy && go test ./...

      - name: Go tests (audit-service)
        working-directory: services/audit-service
        run: go test ./...

      - name: Go tests (cedar-service)
        working-directory: services/cedar-service
        run: go test ./...

      - name: Go tests (decision-service)
        working-directory: services/decision-service
        run: go test ./...

      - name: Install Cedar CLI
        run: chmod +x scripts/install-cedar-cli.sh && ./scripts/install-cedar-cli.sh

      - name: Policy CI
        run: chmod +x scripts/run-policy-ci.sh && ./scripts/run-policy-ci.sh

      - name: Maven tests (compliance-cep)
        working-directory: jobs/compliance-cep
        run: mvn -q test

      - name: Kafka payload contracts
        run: chmod +x scripts/check-kafka-contracts.sh && ./scripts/check-kafka-contracts.sh

      - name: Live evals (mechanical)
        run: ./scripts/run-live-evals.sh

      - name: Live evals Phase 2 (mechanical)
        run: ./scripts/run-live-evals-phase2.sh

      - name: Eval fixture regression (efficiency + behavioral)
        run: chmod +x scripts/run-eval-fixtures.sh && ./scripts/run-eval-fixtures.sh

      - name: Invariant library unit tests
        run: python3 -m pytest evals/lib/test_invariants.py -q

      - name: Start stack
        run: docker compose -f docker-compose.dev.yml up -d --wait

      - name: Seed databases
        run: ./scripts/seed.sh

      - name: Restart alert-service after seed
        run: docker compose -f docker-compose.dev.yml restart alert-service && docker compose -f docker-compose.dev.yml up -d --wait alert-service

      - name: Restart Phase 3 services after seed
        run: |
          docker compose -f docker-compose.dev.yml up -d --wait immudb audit-db audit-service cedar-service decision-service audit-explorer
          docker compose -f docker-compose.dev.yml restart alert-service
          docker compose -f docker-compose.dev.yml up -d --wait alert-service audit-service

      - name: Register schemas
        run: ./scripts/register-schemas.sh

      - name: Register Debezium connector
        run: ./scripts/register-debezium-connector.sh

      - name: Restart state-service after connector
        run: docker compose -f docker-compose.dev.yml restart state-service && docker compose -f docker-compose.dev.yml up -d --wait state-service

      - name: Wait for outbox drain after restart
        run: chmod +x scripts/wait-outbox-drained.sh scripts/smoke-lib-phase2.sh && ./scripts/wait-outbox-drained.sh

      - name: Verify state twin pipeline
        run: chmod +x scripts/verify-state-twin-pipeline.sh scripts/smoke-lib-phase2.sh && ./scripts/verify-state-twin-pipeline.sh

      - name: Maven package (compliance-cep)
        working-directory: jobs/compliance-cep
        run: |
          # flink-job-submitter builds inside Docker as root; reset before host mvn package.
          sudo rm -rf target
          mvn -q package -DskipTests

      - name: Build alert-console
        working-directory: apps/alert-console
        run: npm install && npm run build

      - name: Build audit-explorer
        working-directory: apps/audit-explorer
        run: npm install && npm run build

      - name: Submit Flink job and wait for RUNNING
        env:
          CEP_PAYMENTS_OFFSET: latest
          CEP_TWIN_OFFSET: latest
          CEP_CONSUMER_GROUP_SUFFIX: "-${{ github.run_id }}"
        run: |
          chmod +x scripts/submit-flink-job.sh
          ./scripts/submit-flink-job.sh
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8082/jobs/overview | jq -e '.jobs[] | select(.state=="RUNNING")' >/dev/null; then
              echo "Flink job running"
              exit 0
            fi
            if curl -sf http://localhost:8082/jobs | jq -e '.jobs[] | select(.status=="RUNNING")' >/dev/null; then
              echo "Flink job running"
              exit 0
            fi
            sleep 5
          done
          echo "Flink job did not reach RUNNING" >&2
          curl -sf http://localhost:8082/jobs/overview | jq . || true
          docker compose -f docker-compose.dev.yml logs flink-jobmanager --tail 80
          docker compose -f docker-compose.dev.yml logs flink-taskmanager --tail 80
          exit 1

      - name: Smoke test (Phase 1)
        run: ./scripts/smoke-test.sh

      - name: Smoke test (Phase 2)
        env:
          SMOKE_PHASE2_ALERT_WAIT_SEC: 90
          SMOKE_PHASE2_REDIS_WAIT_SEC: 90
          GRAFANA_URL: http://localhost:3030
        run: chmod +x scripts/smoke-test-phase2.sh scripts/smoke-lib-phase2.sh mocks/simulators/payment-burst.sh scripts/submit-flink-job.sh && ./scripts/smoke-test-phase2.sh

      - name: Smoke test (Phase 3)
        env:
          GRAFANA_URL: http://localhost:3030
        run: chmod +x scripts/smoke-test-phase3.sh scripts/verify-audit-chain.sh && SMOKE_PHASE3_SKIP_PREREQS=1 ./scripts/smoke-test-phase3.sh

      - name: Coverage gates
        run: ./scripts/check-coverage-gates.sh
