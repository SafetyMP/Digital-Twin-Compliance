name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag for all GHCR services (main, sha-abc1234, v1.0.0)"
        required: true
        default: main
        type: string
      action:
        description: "Deploy action"
        required: true
        default: pull
        type: choice
        options:
          - pull
          - bootstrap


permissions:
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Deploy over SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin main
            git checkout main
            git pull origin main
            TAG="${{ inputs.image_tag }}"
            PREFIX=ghcr.io/safetymp/digital-twin-compliance
            export STATE_SERVICE_IMAGE=${PREFIX}/state-service:${TAG}
            export ALERT_SERVICE_IMAGE=${PREFIX}/alert-service:${TAG}
            export ALERT_CONSOLE_IMAGE=${PREFIX}/alert-console:${TAG}
            export COMPLIANCE_CEP_IMAGE=${PREFIX}/compliance-cep:${TAG}
            export AUDIT_SERVICE_IMAGE=${PREFIX}/audit-service:${TAG}
            export CEDAR_SERVICE_IMAGE=${PREFIX}/cedar-service:${TAG}
            export DECISION_SERVICE_IMAGE=${PREFIX}/decision-service:${TAG}
            export AUDIT_EXPLORER_IMAGE=${PREFIX}/audit-explorer:${TAG}
            chmod +x scripts/deploy-stack.sh
            ./scripts/deploy-stack.sh ${{ inputs.action }}

      - name: Deployment summary
        run: |
          echo "### Staging deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image tag:** \`${{ inputs.image_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Action:** \`${{ inputs.action }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Images:** state, alert, alert-console, compliance-cep, audit, cedar, decision, audit-explorer" >> "$GITHUB_STEP_SUMMARY"
