name: Policy gates

on:
  pull_request:
    paths:
      - "policies/**"
      - "services/cedar-service/**"
      - "services/decision-service/**"
      - "scripts/run-policy-ci.sh"

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install Cedar CLI
        run: |
          curl -fsSL https://github.com/cedar-policy/cedar/releases/download/v4.7.0/cedar-4.7.0-x86_64-unknown-linux-gnu.tar.gz | tar xz -C /tmp
          sudo mv /tmp/cedar /usr/local/bin/cedar

      - name: Policy CI
        run: chmod +x scripts/run-policy-ci.sh && ./scripts/run-policy-ci.sh

      - name: Go tests (cedar-service)
        working-directory: services/cedar-service
        run: go test ./...

      - name: Go tests (decision-service)
        working-directory: services/decision-service
        run: go test ./...
