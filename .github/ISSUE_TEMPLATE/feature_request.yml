name: Feature Request
description: Propose a capability aligned with the roadmap
title: "[feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Check [ROADMAP.md](https://github.com/SafetyMP/Digital-Twin-Compliance/blob/main/ROADMAP.md) before filing.
        Large features not on the roadmap need discussion before implementation.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - state-service (ingestion / twin)
        - alert-service / alert-console
        - compliance-cep (Flink CEP)
        - cedar-service / decision-service / policies
        - audit-service / audit-explorer
        - schemas / Kafka contracts
        - deployment / GHCR / CI
        - graph / simulation / reporting (planned)
        - Unsure / needs triage
    validations:
      required: true

  - type: dropdown
    id: roadmap
    attributes:
      label: Roadmap alignment
      options:
        - Extends a capability already on main
        - Matches planned work in ROADMAP.md
        - New idea — not on roadmap yet
        - Unsure / needs triage
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: High-level approach; link an ADR or issue if applicable
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional

  - type: checkboxes
    id: scope
    attributes:
      label: Scope checklist
      options:
        - label: I checked ROADMAP.md and this fits current or planned scope
          required: true
        - label: I am willing to include tests or smoke-test updates if applicable
          required: false
